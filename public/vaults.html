				<a href="/" class="text-zinc-200 font-normal tracking-wider text-xs uppercase hover:opacity-80 transition-opacity">Synch</a>
			</div>
			
			<header class="flex flex-col sm:flex-row sm:items-start justify-between gap-6 mb-8">
				<div>
					<h1 class="text-2xl text-zinc-200 tracking-tight mb-2" data-i18n="title">Remote vaults</h1>
					<p class="text-zinc-500 text-sm max-w-2xl leading-relaxed" data-i18n="subtitle">
						Manage the encrypted vaults attached to this Synch account. Deleting a remote
						vault does not delete local Obsidian files.
					</p>
				</div>
				<div id="user-container" class="hidden items-center gap-4">
					<div id="user" class="text-zinc-500 text-xs bg-zinc-900/50 border border-zinc-800 rounded-full px-3 py-1.5 whitespace-nowrap"></div>
					<button id="logout" type="button" class="shrink-0 text-zinc-500 text-xs hover:text-zinc-300 transition-colors" data-i18n="signOut">Sign out</button>
				</div>
			</header>

			<div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">

				<button id="refresh" type="button" class="w-full sm:w-auto py-1.5 px-4 text-xs bg-transparent border border-zinc-700 text-zinc-300 hover:bg-zinc-800 rounded transition-colors font-medium disabled:opacity-50 disabled:cursor-not-allowed" data-i18n="refresh">
					Refresh

			</div>

				<section id="vault-list" class="grid gap-3" aria-live="polite"></section>
				<section id="empty-guide" class="hidden"></section>
		</div>

		<dialog id="delete-dialog" class="w-[calc(100%-2rem)] sm:w-[480px] bg-[#0a0a0a] text-zinc-200 border border-zinc-800 rounded-xl p-0 shadow-2xl">

					<p id="delete-copy" class="text-zinc-400 text-sm mb-6 leading-relaxed"></p>
					
					<div class="space-y-2">
						<label for="confirm-name" class="block text-xs text-zinc-500" data-i18n="confirmLabel">Type the vault name to confirm</label>
						<input id="confirm-name" autocomplete="off" class="w-full bg-zinc-900/50 border border-zinc-800 rounded px-3 py-2 text-sm text-zinc-200 focus:outline-none focus:border-zinc-600 transition-colors" />
					</div>
				</div>
				<div class="flex justify-end gap-3 px-6 py-4 border-t border-zinc-800/50 bg-white/[0.01]">
					<button id="cancel-delete" value="cancel" type="submit" class="py-2 px-4 text-xs bg-transparent border border-zinc-700 text-zinc-300 hover:bg-zinc-800 rounded transition-colors font-medium">

					</button>
				</div>
			</form>

			const locale = getLocale();
			const statusEl = document.querySelector("#status");
			const userContainerEl = document.querySelector("#user-container");
			const userEl = document.querySelector("#user");
				const logoutButton = document.querySelector("#logout");
				const listEl = document.querySelector("#vault-list");
				const emptyGuideEl = document.querySelector("#empty-guide");
				const refreshButton = document.querySelector("#refresh");
			const deleteDialog = document.querySelector("#delete-dialog");
			const deleteCopy = document.querySelector("#delete-copy");
			const confirmInput = document.querySelector("#confirm-name");
			const confirmDeleteButton = document.querySelector("#confirm-delete");
			let selectedVault = null;

			refreshButton.addEventListener("click", () => {
				void loadVaults();
			});

			confirmInput.addEventListener("input", () => {
				confirmDeleteButton.disabled =
					!selectedVault || confirmInput.value !== selectedVault.name;
			});

			confirmDeleteButton.addEventListener("click", () => {
				void deleteSelectedVault();
			});

			logoutButton.addEventListener("click", () => {
				void signOut();
			});

			applyTranslations();
			void initialize();

			async function initialize() {
				const session = await loadSession();
				if (!session?.user) {
					redirectToLogin();
					return;
				}

				userEl.textContent = session.user.email || session.user.name || t("signedIn");
				userContainerEl.classList.remove("hidden");
				userContainerEl.classList.add("flex");
				await loadVaults();
			}

			async function signOut() {
				logoutButton.disabled = true;
				try {
					const response = await fetch("/api/auth/sign-out", {
						method: "POST",
						credentials: "include",
						headers: {
							"content-type": "application/json",
						},
						body: JSON.stringify({}),
					});
					if (!response.ok) {
						setStatus(await readErrorMessage(response, t("unableToSignOut")));
						logoutButton.disabled = false;
						return;
					}
					redirectToLogin();
				} catch {
					setStatus(t("apiUnavailable"));
					logoutButton.disabled = false;
				}
			}

			async function loadSession() {
				try {
					const response = await fetch("/api/auth/get-session", { credentials: "include" });
					if (!response.ok) {
						return null;
					}
					return await response.json();
				} catch {
					return null;
				}
			}

			function redirectToLogin() {
				const loginUrl = new URL("/signin", window.location.origin);
				loginUrl.searchParams.set("return_to", window.location.href);
				loginUrl.searchParams.set("lang", locale);
				window.location.assign(loginUrl.toString());
			}

			function getLocale() {
				const params = new URLSearchParams(window.location.search);
				const candidates = [
					params.get("lang"),
					navigator.language,
				];
				const selected = candidates.map(normalizeLocale).find(Boolean) || "en";
				document.documentElement.lang = selected;
				return selected;
			}

			function normalizeLocale(candidate) {
				const locale = candidate?.toLowerCase() || "";
				if (messages[locale]) return locale;
				if (locale === "en" || locale.startsWith("en-")) return "en";
				if (locale === "ko" || locale.startsWith("ko-")) return "ko";
				if (locale === "ja" || locale.startsWith("ja-")) return "ja";
				if (locale === "zh-tw" || locale === "zh-hk" || locale === "zh-hant" || locale.startsWith("zh-hant-")) return "zh-tw";
				if (locale === "zh" || locale === "zh-cn" || locale === "zh-sg" || locale === "zh-hans" || locale.startsWith("zh-hans-")) return "zh-cn";
				return "";
			}

			function t(key, params = {}) {
				const template = messages[locale]?.[key] || messages.en[key] || key;
				return Object.entries(params).reduce(
					(text, [name, value]) => text.replaceAll(`{${name}}`, String(value)),
					template,
				);
			}

			function applyTranslations() {
				for (const element of document.querySelectorAll("[data-i18n]")) {
					element.textContent = t(element.dataset.i18n);
				}
				document.title = `Synch ${t("title")}`;
			}

			async function loadVaults() {
				setStatus(t("loading"));
				refreshButton.disabled = true;
				try {
					const response = await fetch("/v1/vaults?includeDeleting=true", {
						credentials: "include",
					});
					if (response.status === 401) {
						redirectToLogin();
						return;
					}
					if (!response.ok) {
						setStatus(await readErrorMessage(response, t("unableToLoadVaults")));
						return;
					}
					const json = await response.json();
					renderVaults(Array.isArray(json.vaults) ? json.vaults : []);
				} catch {
					setStatus(t("apiUnavailable"));
				} finally {
					refreshButton.disabled = false;
				}
			}

				function renderVaults(vaults) {
					listEl.replaceChildren();
					emptyGuideEl.replaceChildren();
					setStatus(vaults.length === 1 ? t("countOne") : t("countMany", { count: vaults.length }));

					if (vaults.length === 0) {
						listEl.classList.add("hidden");
						emptyGuideEl.classList.remove("hidden");
						emptyGuideEl.append(renderEmptyGuide());
						return;
					}

					listEl.classList.remove("hidden");
					emptyGuideEl.classList.add("hidden");

					for (const vault of vaults) {
					const row = document.createElement("article");
					row.className = "flex flex-col sm:flex-row sm:items-center justify-between gap-4 p-5 border border-zinc-800 rounded-xl bg-zinc-900/30 hover:border-zinc-700 transition-colors";

					const details = document.createElement("div");
					const name = document.createElement("h2");
					name.className = "text-base font-medium text-zinc-200 mb-1";
					name.textContent = vault.name;
					const meta = document.createElement("p");
					meta.className = "text-zinc-500 text-xs leading-relaxed break-all";
					meta.textContent = formatVaultMeta(vault);
					details.append(name, meta);

					const isDeleting =
						vault.deletionStatus === "queued" || vault.deletionStatus === "running";
					const button = document.createElement("button");
					button.className = "w-full sm:w-auto py-2 px-4 text-xs bg-transparent border border-red-900/50 text-red-400 hover:bg-red-900/20 rounded transition-colors font-medium disabled:opacity-50 disabled:cursor-not-allowed";
					button.type = "button";
					button.textContent = isDeleting ? t("deleting") : t("delete");
					button.disabled = isDeleting;
					button.addEventListener("click", () => {
						openDeleteDialog(vault);
					});

					row.append(details, button);
					listEl.append(row);
				}

				if (
					vaults.some(
						(vault) =>
							vault.deletionStatus === "queued" || vault.deletionStatus === "running",
					)
				) {
					window.setTimeout(() => {
						void loadVaults();
					}, 2500);
				}
			}

			function renderEmptyGuide() {
				const guide = document.createElement("section");
				guide.className = "border border-zinc-800 rounded-xl bg-zinc-900/20 overflow-hidden";

				const header = document.createElement("div");
				header.className = "p-6 border-b border-zinc-800/70";

				const eyebrow = document.createElement("p");
				eyebrow.className = "text-zinc-500 text-xs mb-2";
				eyebrow.textContent = t("empty");

				const title = document.createElement("h2");
				title.className = "text-lg font-medium text-zinc-200 mb-2";
				title.textContent = t("emptyGuideTitle");

				const intro = document.createElement("p");
				intro.className = "text-zinc-400 text-sm leading-relaxed max-w-3xl";
				intro.textContent = t("emptyGuideIntro");

				header.append(eyebrow, title, intro);

				const steps = document.createElement("ol");
				steps.className = "divide-y divide-zinc-800/70";

				const stepKeys = [
					["emptyGuideInstallTitle", "emptyGuideInstallBody"],
					["emptyGuideSignInTitle", "emptyGuideSignInBody"],
					["emptyGuideCreateTitle", "emptyGuideCreateBody"],
					["emptyGuidePasswordTitle", "emptyGuidePasswordBody"],
					["emptyGuideDeviceTitle", "emptyGuideDeviceBody"],
				];

				stepKeys.forEach(([titleKey, bodyKey], index) => {
					const item = document.createElement("li");
					item.className = "flex gap-4 p-5";

					const marker = document.createElement("div");
					marker.className = "mt-0.5 flex h-7 w-7 shrink-0 items-center justify-center rounded-full border border-zinc-700 bg-zinc-950 text-xs font-medium text-zinc-300";
					marker.textContent = String(index + 1);

					const content = document.createElement("div");
					content.className = "min-w-0";

					const stepTitle = document.createElement("h3");
					stepTitle.className = "text-sm font-medium text-zinc-200 mb-1";
					stepTitle.textContent = t(titleKey);

					const body = document.createElement("p");
					body.className = "text-sm leading-relaxed text-zinc-500";
					body.textContent = t(bodyKey);

					content.append(stepTitle, body);
					item.append(marker, content);
					steps.append(item);
				});

				guide.append(header, steps);
				return guide;
			}

			function openDeleteDialog(vault) {
				selectedVault = vault;
				deleteCopy.textContent = t("deleteCopy", { name: vault.name });
				confirmInput.value = "";
				confirmDeleteButton.disabled = true;
				deleteDialog.showModal();
				confirmInput.focus();
			}

			async function deleteSelectedVault() {
				if (!selectedVault || confirmInput.value !== selectedVault.name) {
					return;
				}

				confirmDeleteButton.disabled = true;
				setStatus(t("deletingVault", { name: selectedVault.name }));
				try {
					const response = await fetch(`/v1/vaults/${encodeURIComponent(selectedVault.id)}`, {
						method: "DELETE",
						credentials: "include",
					});
					if (!response.ok) {
						setStatus(await readErrorMessage(response, t("unableToDeleteVault")));
						return;
					}
					deleteDialog.close();
					setStatus(t("queuedForDeletion", { name: selectedVault.name }));
					selectedVault = null;
					await loadVaults();
				} catch {
					setStatus(t("apiUnavailable"));
				} finally {
					confirmDeleteButton.disabled = false;
				}
			}

			function formatDate(value) {
				const date = new Date(value);
				if (Number.isNaN(date.getTime())) {
					return t("unknown");
				}
				return new Intl.DateTimeFormat(locale, {
					year: "numeric",
					month: "short",
					day: "numeric",
				}).format(date);
			}

			function formatVaultMeta(vault) {
				const parts = [vault.id, t("created", { date: formatDate(vault.createdAt) })];
				if (vault.deletionStatus) {
					parts.push(t("deletionStatus", { status: vault.deletionStatus }));
				}
				if (vault.deletionError) {
					parts.push(vault.deletionError);
				}
				return parts.join(" - ");
			}

			function setStatus(message) {
				statusEl.textContent = message;
			}

			async function readErrorMessage(response, fallback) {
				try {
					const json = await response.json();
					return json?.message || fallback;
				} catch {
					return fallback;
				}
			}
		</script>
	</body>
</html>
